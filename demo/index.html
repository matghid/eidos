<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eidos — Demo</title>
<style>
:root{--bg:#f6f4ef;--panel:#fff;--text:#272522;--muted:#77716a;--line:#e6e0d7;--accent:#6d5bd0;--soft:#eee9ff;--shadow:0 16px 45px #2d271b18}[data-theme=dark]{--bg:#171716;--panel:#222220;--text:#f4f0e9;--muted:#aaa49a;--line:#3b3834;--accent:#a893ff;--soft:#332d4d;--shadow:0 18px 55px #0006}*{box-sizing:border-box}body{margin:0;font:14px Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);overflow:hidden}button,input{font:inherit}.app{height:100vh;display:grid;grid-template-columns:245px 1fr}.side{padding:16px;background:color-mix(in srgb,var(--panel) 72%,var(--bg));border-right:1px solid var(--line);display:flex;flex-direction:column;gap:14px}.brand{display:flex;align-items:center;gap:10px;font-size:17px}.logo{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(145deg,var(--accent),#9e8cf0);color:#fff;font-weight:800}.pill{font-size:10px;color:var(--accent);background:var(--soft);padding:3px 7px;border-radius:999px}.search{border:1px solid var(--line);background:var(--panel);border-radius:10px;padding:9px;width:100%;color:var(--text)}.nav button,.note{width:100%;border:0;background:transparent;color:var(--text);padding:9px;border-radius:9px;text-align:left;cursor:pointer}.nav button:hover,.note:hover,.note.active{background:var(--panel)}.notes{overflow:auto;display:flex;flex-direction:column;gap:3px}.new,.tool{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:9px;padding:8px 10px;cursor:pointer}.new{margin-top:auto}.main{min-width:0;display:flex;flex-direction:column}.top{height:58px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 18px}.tabs{display:flex;gap:5px}.tab{border:0;background:transparent;color:var(--muted);padding:9px 12px;border-radius:8px;cursor:pointer}.tab.active{background:var(--bg);color:var(--text);font-weight:700}.view{display:none;flex:1;min-height:0}.view.active{display:block}.editor{height:100%;overflow:auto;padding:45px 9vw 80px}.paper{max-width:790px;margin:auto}.cover{height:135px;border-radius:19px;background:linear-gradient(120deg,#dcd1ff,#f6d4ce 55%,#f1e3b6);box-shadow:var(--shadow);margin-bottom:26px}.title{border:0;outline:0;background:transparent;color:var(--text);width:100%;font-size:40px;font-weight:800}.toolbar{position:sticky;top:10px;width:max-content;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:6px;display:flex;gap:4px;box-shadow:var(--shadow);z-index:4}.toolbar button{border:0;background:transparent;color:var(--text);padding:7px 9px;border-radius:7px;cursor:pointer}.toolbar button:hover{background:var(--bg)}[contenteditable]{outline:0;font:18px/1.75 Georgia,serif;min-height:380px}[contenteditable] h2{font:700 27px Inter,sans-serif}[contenteditable] blockquote{margin:18px 0;padding:11px 16px;border-left:3px solid var(--accent);background:var(--soft)}.board{height:100%;position:relative;overflow:hidden;background-image:radial-gradient(var(--line) 1.2px,transparent 1.2px);background-size:24px 24px}.board-tools{position:absolute;top:16px;left:16px;z-index:6;display:flex;gap:6px;background:var(--panel);padding:7px;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}.stage{position:absolute;inset:0}.node{position:absolute;width:220px;padding:14px;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);cursor:grab;user-select:none;z-index:2}.node b{display:block;margin-bottom:7px}.node small{color:var(--muted);line-height:1.45}.links{position:absolute;inset:0;pointer-events:none;z-index:1}.links path{stroke:var(--accent);stroke-width:2.2;fill:none}.links text{fill:var(--text);font-size:12px;paint-order:stroke;stroke:var(--panel);stroke-width:6px;stroke-linejoin:round;pointer-events:auto;cursor:pointer}.modal{position:fixed;inset:0;background:#0007;display:none;place-items:center;z-index:20}.modal.show{display:grid}.box{width:min(420px,90vw);background:var(--panel);padding:22px;border-radius:17px;box-shadow:var(--shadow)}.box input{width:100%;padding:11px;border:1px solid var(--line);border-radius:9px;background:var(--bg);color:var(--text);margin:12px 0}.row{display:flex;justify-content:flex-end;gap:8px}@media(max-width:780px){.app{grid-template-columns:76px 1fr}.brand b,.pill,.search,.note span,.nav span{display:none}.editor{padding:28px 22px}.title{font-size:32px}}
</style>
</head>
<body>
<div class="app"><aside class="side"><div class="brand"><div class="logo">E</div><b>Eidos</b><i class="pill">DEMO</i></div><input class="search" id="search" placeholder="Cerca note…"><div class="nav"><button>▦ <span>Note</span></button><button id="openBoard">⌘ <span>Board</span></button></div><div class="notes" id="notes"></div><button class="new" id="newNote">＋ Nuova nota</button></aside><main class="main"><header class="top"><div class="tabs"><button class="tab active" id="noteTab">Nota</button><button class="tab" id="boardTab">Board investigativa</button></div><div><button class="tool" id="theme">◐</button></div></header><section class="view active" id="noteView"><div class="editor"><div class="paper"><div class="cover"></div><input class="title" id="title"><p style="color:var(--muted)">#ricerca · modificata ora</p><div class="toolbar"><button data-cmd="bold"><b>B</b></button><button data-cmd="italic"><i>I</i></button><button data-cmd="formatBlock" data-value="h2">Titolo</button><button data-cmd="insertUnorderedList">Lista</button><button data-cmd="formatBlock" data-value="blockquote">Citazione</button></div><article id="body" contenteditable="true"></article></div></div></section><section class="view" id="boardView"><div class="board"><div class="board-tools"><button class="tool" id="addNode">＋ Nota</button><button class="tool" id="connect">↗ Collega</button></div><svg class="links" id="links"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="var(--accent)"/></marker></defs></svg><div class="stage" id="stage"></div></div></section></main></div>
<div class="modal" id="modal"><div class="box"><h3>Testo della freccia</h3><input id="edgeText"><div class="row"><button class="tool" id="deleteEdge">Elimina</button><button class="tool" id="cancel">Annulla</button><button class="tool" id="saveEdge">Salva</button></div></div></div>
<script>
const $=s=>document.querySelector(s),store='eidos-github-demo';const defaults={theme:'light',active:'1',notes:[{id:'1',title:'Dossier principale',body:'<h2>Obiettivo</h2><p>Raccogliere informazioni, collegare fonti e costruire una mappa visuale.</p><blockquote>Ogni collegamento può descrivere una relazione.</blockquote><ul><li>Verificare la timeline</li><li>Confrontare i documenti</li></ul>'},{id:'2',title:'Intervista — Marta R.',body:'<h2>Osservazioni</h2><p>La testimone segnala un intervallo mancante.</p>'},{id:'3',title:'Documenti da verificare',body:'<p>Controllare date, firme e provenienza.</p>'}],nodes:[{id:'a',x:120,y:120,title:'Documento 14',text:'Firma non ancora verificata.'},{id:'b',x:470,y:90,title:'Marta R.',text:'Segnala una lacuna nella timeline.'},{id:'c',x:420,y:340,title:'Intervallo mancante',text:'18:40–19:15 senza registrazioni.'}],edges:[{id:'e1',from:'a',to:'b',label:'citata da'},{id:'e2',from:'b',to:'c',label:'segnala'}]};let state=JSON.parse(localStorage.getItem(store)||'null')||structuredClone(defaults),mode=false,first=null,editing=null;function save(){localStorage.setItem(store,JSON.stringify(state))}function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function current(){return state.notes.find(n=>n.id===state.active)}function renderNotes(q=''){notes.innerHTML='';state.notes.filter(n=>n.title.toLowerCase().includes(q.toLowerCase())).forEach(n=>{let b=document.createElement('button');b.className='note '+(n.id===state.active?'active':'');b.innerHTML='● <span>'+esc(n.title)+'</span>';b.onclick=()=>load(n.id);notes.appendChild(b)})}function sync(){let n=current();if(!n)return;n.title=title.value||'Senza titolo';n.body=body.innerHTML;save();renderNotes(search.value)}function load(id){sync();state.active=id;let n=current();title.value=n.title;body.innerHTML=n.body;save();renderNotes(search.value);show('note')}function show(v){noteView.classList.toggle('active',v==='note');boardView.classList.toggle('active',v==='board');noteTab.classList.toggle('active',v==='note');boardTab.classList.toggle('active',v==='board');if(v==='board')renderBoard()}noteTab.onclick=()=>show('note');boardTab.onclick=openBoard.onclick=()=>show('board');search.oninput=e=>renderNotes(e.target.value);title.oninput=body.oninput=sync;newNote.onclick=()=>{sync();let id=Date.now()+'';state.notes.unshift({id,title:'Nuova nota',body:'<p>Inizia a scrivere…</p>'});state.active=id;load(id)};document.querySelectorAll('[data-cmd]').forEach(b=>b.onclick=()=>{document.execCommand(b.dataset.cmd,false,b.dataset.value||null);body.focus();sync()});theme.onclick=()=>{state.theme=state.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=state.theme;save()};document.documentElement.dataset.theme=state.theme;
function node(n){let d=document.createElement('div');d.className='node';d.style.left=n.x+'px';d.style.top=n.y+'px';d.innerHTML='<b>'+esc(n.title)+'</b><small>'+esc(n.text)+'</small>';d.onpointerdown=e=>{if(mode)return;let sx=e.clientX,sy=e.clientY,ox=n.x,oy=n.y;d.setPointerCapture(e.pointerId);let mv=v=>{n.x=ox+v.clientX-sx;n.y=oy+v.clientY-sy;d.style.left=n.x+'px';d.style.top=n.y+'px';draw()};let up=()=>{d.removeEventListener('pointermove',mv);d.removeEventListener('pointerup',up);save()};d.addEventListener('pointermove',mv);d.addEventListener('pointerup',up)};d.onclick=e=>{e.stopPropagation();if(mode){if(!first)first=n.id;else if(first!==n.id){let edge={id:Date.now()+'',from:first,to:n.id,label:'collegato a'};state.edges.push(edge);first=null;mode=false;connect.style.background='';save();renderBoard();edit(edge)}}};return d}function renderBoard(){stage.innerHTML='';state.nodes.forEach(n=>stage.appendChild(node(n)));draw()}function draw(){links.querySelectorAll('.edge').forEach(x=>x.remove());state.edges.forEach(e=>{let a=state.nodes.find(n=>n.id===e.from),b=state.nodes.find(n=>n.id===e.to);if(!a||!b)return;let x1=a.x+220,y1=a.y+42,x2=b.x,y2=b.y+42,m=(x1+x2)/2,g=document.createElementNS('http://www.w3.org/2000/svg','g');g.classList.add('edge');let p=document.createElementNS(g.namespaceURI,'path');p.setAttribute('d',`M${x1},${y1} C${m},${y1} ${m},${y2} ${x2},${y2}`);p.setAttribute('marker-end','url(#arrow)');let t=document.createElementNS(g.namespaceURI,'text');t.setAttribute('x',m);t.setAttribute('y',(y1+y2)/2-8);t.setAttribute('text-anchor','middle');t.textContent=e.label;t.onclick=()=>edit(e);g.append(p,t);links.appendChild(g)})}function edit(e){editing=e;edgeText.value=e.label;modal.classList.add('show');setTimeout(()=>edgeText.focus(),50)}connect.onclick=()=>{mode=!mode;first=null;connect.style.background=mode?'var(--soft)':''};addNode.onclick=()=>{state.nodes.push({id:Date.now()+'',x:220+Math.random()*350,y:150+Math.random()*260,title:'Nuova nota',text:'Elemento trascinabile della board.'});save();renderBoard()};cancel.onclick=()=>modal.classList.remove('show');saveEdge.onclick=()=>{if(editing)editing.label=edgeText.value||'collegato a';save();modal.classList.remove('show');draw()};deleteEdge.onclick=()=>{state.edges=state.edges.filter(e=>e!==editing);save();modal.classList.remove('show');draw()};load(state.active);renderBoard();
</script>
</body></html>
